name: Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build prod images (app + web)
        run: |
          docker build -f .docker/Dockerfile --target prod \
            -t ghcr.io/${{ github.repository }}:app-${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}:app-latest \
            .
          docker build -f .docker/Dockerfile --target web \
            -t ghcr.io/${{ github.repository }}:web-${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}:web-latest \
            .

      - name: Push images
        run: |
          docker push ghcr.io/${{ github.repository }}:app-${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:app-latest
          docker push ghcr.io/${{ github.repository }}:web-${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:web-latest

      # (опц.) выложим текущий код в /var/lib/42k/code, чтобы nginx видел public/ и статику из образа:
      - name: Pack built code for nginx (public)
        run: |
          mkdir -p out && rsync -a app/ out/
          tar -C out -czf code.tgz .
      - name: Upload code to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "code.tgz"
          target: "/home/deploy/42k/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            mkdir -p /home/deploy/42k/code
            tar -C /home/deploy/42k/code -xzf /home/deploy/42k/code.tgz
            cd /opt/42k
            export APP_TAG=latest
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Run migrations on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/42k

            # (опц.) техобслуживание на время миграций
            docker compose -f docker-compose.prod.yml exec -T app php artisan down --render="errors::503" || true

            # ждём готовности БД (если только что перезапустилась)
            until docker compose -f docker-compose.prod.yml exec -T db \
              sh -lc 'mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "SELECT 1"' >/dev/null 2>&1; do
              echo "waiting for db..."; sleep 2
            done

            # применяем миграции (идемпотентно)
            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force

            # (опц.) прогреть кеши
            docker compose -f docker-compose.prod.yml exec -T app sh -lc 'php artisan optimize' || true

            # выходим из техобслуживания
            docker compose -f docker-compose.prod.yml exec -T app php artisan up || true
