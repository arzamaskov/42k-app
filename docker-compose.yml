services:
  app:
    build:
      context: .
      dockerfile: ./.docker/Dockerfile
      target: dev
    container_name: app
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www/html
    environment:
      HOME: /var/www
      COMPOSER_HOME: /var/www/.composer
      NPM_CONFIG_CACHE: /var/www/.npm
      XDG_CONFIG_HOME: /var/www/.config
      XDG_CONFIG_CACHE: /var/www/.cache
    volumes:
      - ./app:/var/www/html
      - ./app/.composer:/var/www/.composer
      - ./app/.npm:/var/www/.npm
      - ./app/.config:/var/www/.config
      - ./app/.cache:/var/www/.cache
    depends_on:
      - db
      - redis

  web:
    image: nginx:1.27-alpine
    container_name: web
    ports:
      - "80:80"
    volumes:
      - ./app:/var/www/html
      - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_DATABASE: runtracker
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    command: ["mysqld","--default-authentication-plugin=mysql_native_password","--innodb-buffer-pool-size=256M"]
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: redis

  queue:
    build:
      context: .
      dockerfile: ./.docker/Dockerfile
      target: dev
    container_name: queue
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www/html
    command: php artisan queue:work --queue=default --sleep=3 --tries=3
    environment:
      HOME: /var/www
      COMPOSER_HOME: /var/www/.composer
      NPM_CONFIG_CACHE: /var/www/.npm
    volumes:
      - ./app:/var/www/html
      - ./app/.composer:/var/www/.composer
      - ./app/.npm:/var/www/.npm
    depends_on:
      - app
      - redis

  scheduler:
    build:
      context: .
      dockerfile: ./.docker/Dockerfile
      target: dev
    container_name: scheduler
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    environment:
      HOME: /var/www
      COMPOSER_HOME: /var/www/.composer
      NPM_CONFIG_CACHE: /var/www/.npm
    volumes:
      - ./app:/var/www/html
      - ./app/.composer:/var/www/.composer
      - ./app/.npm:/var/www/.npm
    depends_on:
      - app

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "8025:8025"

volumes:
  dbdata:
